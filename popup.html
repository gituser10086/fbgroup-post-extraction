<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>FB Group 帖子采集器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#eee;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue:#1877f2;--blue-bg:#e7f0fd;--blue-text:#0d52b2;
  --green:#2e7d32;--green-bg:#e8f5e9;
  --red:#c62828;--red-bg:#ffebee;
  --amber-bg:#fff8e1;--amber-text:#7c5a00;
  --r:8px;--rlg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;color:var(--text);background:var(--bg);width:380px;max-height:600px;display:flex;flex-direction:column;overflow:hidden}

.header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.hicon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hicon svg{width:18px;height:18px;fill:#fff}
.htitle{font-size:15px;font-weight:600}
.hsub{font-size:11px;color:var(--text3);margin-top:1px}

.settings{padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.srow{display:flex;align-items:center;gap:8px}
.slabel{font-size:12px;color:var(--text2);white-space:nowrap}
select,input[type=number]{padding:5px 8px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);outline:none}
select:focus,input[type=number]:focus{border-color:var(--blue)}

.actions{padding:10px 16px;display:flex;gap:8px;flex-shrink:0;border-bottom:0.5px solid var(--border)}
.btn{flex:1;padding:8px 10px;font-size:13px;font-weight:500;border-radius:var(--r);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s,background .15s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-secondary{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.btn-secondary:hover:not(:disabled){background:var(--bg3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(198,40,40,.2)}
.btn-danger:hover:not(:disabled){background:#ffcdd2}

.status{padding:7px 16px;font-size:12px;display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:32px}
.status.idle{color:var(--text3)}
.status.loading{color:var(--blue)}
.status.success{color:var(--green);background:var(--green-bg)}
.status.error{color:var(--red);background:var(--red-bg)}
.status.warn{color:var(--amber-text);background:var(--amber-bg)}
.dots{display:flex;gap:3px}
.dots span{width:5px;height:5px;background:currentColor;border-radius:50%;animation:blink 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.results{flex:1;overflow-y:auto;padding:8px 12px 10px}
.results::-webkit-scrollbar{width:4px}
.results::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.metric{background:var(--bg2);border-radius:var(--r);padding:7px 8px;text-align:center}
.mval{font-size:17px;font-weight:600}
.mlbl{font-size:10px;color:var(--text3);margin-top:1px}

.frow{display:flex;gap:6px;margin-bottom:8px}
.frow input[type=text]{flex:1;padding:5px 8px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);outline:none}
.frow input[type=text]:focus{border-color:var(--blue)}
.frow select{font-size:12px;padding:4px 6px}

.post{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rlg);padding:9px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,background .12s}
.post:hover{border-color:var(--border2);background:var(--bg2)}
.phead{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pauthor{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptime{font-size:11px;color:var(--text3);white-space:nowrap}
.pbody{font-size:12px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.pfoot{display:flex;align-items:center;gap:8px}
.stat{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
.stat svg{width:12px;height:12px}
.permalink{margin-left:auto;font-size:11px;color:var(--blue);display:flex;align-items:center;gap:2px;text-decoration:none}
.permalink:hover{text-decoration:underline}

.export-bar{display:none;padding:9px 16px;border-top:0.5px solid var(--border);gap:6px;flex-shrink:0}
.export-bar.on{display:flex}
.export-bar .btn{font-size:12px;padding:6px 10px}

.empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px;line-height:1.7}
.empty svg{width:34px;height:34px;opacity:.25;display:block;margin:0 auto 8px}

.notfb{padding:28px 20px;text-align:center;color:var(--text2);font-size:13px;line-height:1.7}
.notfb svg{width:38px;height:38px;opacity:.22;display:block;margin:0 auto 10px}
.notfb strong{color:var(--text);display:block;margin-bottom:4px;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="hicon">
    <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
  </div>
  <div>
    <div class="htitle">FB Group 帖子采集器</div>
    <div class="hsub" id="gname">请打开 Facebook Group 页面</div>
  </div>
</div>

<div id="main" style="display:none;flex-direction:column;flex:1;overflow:hidden">

  <div class="settings">
    <div class="srow">
      <span class="slabel">最多抓取</span>
      <input type="number" id="max-posts" value="50" min="5" max="500" style="width:64px">
      <span class="slabel">条帖子</span>
      <span class="slabel" style="margin-left:10px">自动滚动</span>
      <select id="scroll-times">
        <option value="0">不滚动</option>
        <option value="3" selected>3次</option>
        <option value="6">6次</option>
        <option value="10">10次</option>
        <option value="20">20次</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="scrape-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      采集帖子
    </button>
    <button class="btn btn-secondary" id="append-btn" disabled title="继续滚动并追加新帖子">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      追加
    </button>
    <button class="btn btn-danger" id="clear-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
      清空
    </button>
  </div>

  <div class="status idle" id="status">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    <span id="status-text">就绪，点击「采集帖子」开始</span>
  </div>

  <div class="results" id="results">
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      采集后的帖子将显示在这里
    </div>
  </div>

  <div class="export-bar" id="export-bar">
    <button class="btn btn-secondary" id="exp-json">⬇ JSON</button>
    <button class="btn btn-secondary" id="exp-csv">⬇ CSV</button>
    <button class="btn btn-secondary" id="exp-txt">⬇ TXT</button>
  </div>

</div>

<div id="notfb" style="display:none">
  <div class="notfb">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <strong>请先打开 Facebook Group 页面</strong>
    访问 facebook.com/groups/… 后再使用本工具
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
